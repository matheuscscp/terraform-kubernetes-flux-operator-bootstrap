name: upgrade

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write      # for committing dependency upgrades and pushing the branch.
  pull-requests: write # for opening or updating the upgrade pull request.

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Upgrade pinned versions
        id: versions
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require("fs");

            const fetchJson = async (url) => {
              const response = await fetch(url, {
                headers: { "user-agent": "terraform-kubernetes-flux-operator-bootstrap-upgrade-workflow" },
              });
              if (!response.ok) {
                throw new Error(`request failed for ${url}: ${response.status} ${response.statusText}`);
              }
              return response.json();
            };

            const fetchText = async (url) => {
              const response = await fetch(url, {
                headers: { "user-agent": "terraform-kubernetes-flux-operator-bootstrap-upgrade-workflow" },
              });
              if (!response.ok) {
                throw new Error(`request failed for ${url}: ${response.status} ${response.statusText}`);
              }
              return (await response.text()).trim();
            };

            const latestStableProviderVersion = async (name) => {
              const data = await fetchJson(`https://registry.terraform.io/v1/providers/hashicorp/${name}/versions`);
              return data.versions
                .map((item) => item.version)
                .filter((version) => !version.includes("-"))
                .sort((a, b) => {
                  const pa = a.split(".").map(Number);
                  const pb = b.split(".").map(Number);
                  for (let i = 0; i < Math.max(pa.length, pb.length); i += 1) {
                    const diff = (pa[i] ?? 0) - (pb[i] ?? 0);
                    if (diff !== 0) return diff;
                  }
                  return 0;
                })
                .at(-1);
            };

            const majorConstraint = (version) => {
              const major = version.split(".")[0];
              return `~> ${major}.0`;
            };

            const dockerfilePath = "Dockerfile";
            const versionsPath = "versions.tf";
            const dockerfile = fs.readFileSync(dockerfilePath, "utf8");
            const versionsTf = fs.readFileSync(versionsPath, "utf8");

            const currentHelmVersion = dockerfile.match(/^ARG HELM_VERSION=(.+)$/m)[1];
            const currentKubectlVersion = dockerfile.match(/^ARG KUBECTL_VERSION=(.+)$/m)[1];
            const currentHelmProviderVersion = versionsTf.match(/helm\s*=\s*\{[\s\S]*?source\s*=\s*"hashicorp\/helm"[\s\S]*?version\s*=\s*"([^"]+)"/m)[1];
            const currentKubernetesProviderVersion = versionsTf.match(/kubernetes\s*=\s*\{[\s\S]*?source\s*=\s*"hashicorp\/kubernetes"[\s\S]*?version\s*=\s*"([^"]+)"/m)[1];

            const helmRelease = await fetchJson("https://api.github.com/repos/helm/helm/releases/latest");
            const kubectlVersion = await fetchText("https://dl.k8s.io/release/stable.txt");
            const helmVersion = helmRelease.tag_name;
            const helmProviderVersion = majorConstraint(await latestStableProviderVersion("helm"));
            const kubernetesProviderVersion = majorConstraint(await latestStableProviderVersion("kubernetes"));

            const nextDockerfile = dockerfile
              .replace(/^ARG HELM_VERSION=.*$/m, `ARG HELM_VERSION=${helmVersion}`)
              .replace(/^ARG KUBECTL_VERSION=.*$/m, `ARG KUBECTL_VERSION=${kubectlVersion}`);

            const nextVersionsTf = versionsTf
              .replace(
                /(helm\s*=\s*\{[\s\S]*?source\s*=\s*"hashicorp\/helm"[\s\S]*?version\s*=\s*")[^"]+(")/m,
                `$1${helmProviderVersion}$2`,
              )
              .replace(
                /(kubernetes\s*=\s*\{[\s\S]*?source\s*=\s*"hashicorp\/kubernetes"[\s\S]*?version\s*=\s*")[^"]+(")/m,
                `$1${kubernetesProviderVersion}$2`,
              );

            fs.writeFileSync(dockerfilePath, nextDockerfile);
            fs.writeFileSync(versionsPath, nextVersionsTf);

            const changes = [];
            if (currentKubectlVersion !== kubectlVersion) changes.push(`kubectl to ${kubectlVersion}`);
            if (currentHelmVersion !== helmVersion) changes.push(`helm to ${helmVersion}`);
            if (currentHelmProviderVersion !== helmProviderVersion) changes.push(`terraform-provider-helm to ${helmProviderVersion}`);
            if (currentKubernetesProviderVersion !== kubernetesProviderVersion) changes.push(`terraform-provider-kubernetes to ${kubernetesProviderVersion}`);

            let message = "Upgrade pinned dependencies";
            if (changes.length === 1) {
              message = `Upgrade ${changes[0]}`;
            } else if (changes.length > 1) {
              message = `Upgrade ${changes.slice(0, -1).join(", ")} and ${changes.at(-1)}`;
            }

            core.setOutput("message", message);

      - name: Create pull request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          branch: upgrade-dependencies
          commit-message: ${{ steps.versions.outputs.message }}
          title: ${{ steps.versions.outputs.message }}
          delete-branch: true
          body: |
            Automated update of pinned dependency versions in the production module code.

            **Don't forget to run the e2e for this branch before merging:**

            https://github.com/${{ github.repository }}/actions/workflows/e2e.yaml
