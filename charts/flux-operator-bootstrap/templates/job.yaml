apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  template:
    metadata: {}
    spec:
      serviceAccountName: {{ .Release.Name }}
      restartPolicy: Never
      containers:
      - name: bootstrap
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: FLUX_INSTANCE_FILE
          value: /bootstrap/flux-instance.yaml
        - name: PREREQUISITES_DIR
          value: /bootstrap
        - name: TIMEOUT
          value: {{ .Values.timeout | quote }}
        - name: BOOTSTRAP_NAMESPACE
          value: {{ .Release.Namespace }}
        - name: SERVICE_ACCOUNT_NAME
          value: {{ .Release.Name }}
        - name: CLUSTER_ROLE_BINDING_NAME
          value: {{ .Release.Name }}-{{ .Release.Namespace }}
        - name: DEBUG_FAULT_INJECTION_MESSAGE
          value: {{ .Values.debugFaultInjectionMessage | quote }}
{{- if .Values.managedResources.secretsYAML }}
        - name: SECRETS_FILE
          value: /bootstrap-secrets/secrets.yaml
{{- end }}
        volumeMounts:
        - name: bootstrap-manifest
          mountPath: /bootstrap
          readOnly: true
{{- if .Values.managedResources.secretsYAML }}
        - name: bootstrap-secrets
          mountPath: /bootstrap-secrets
          readOnly: true
{{- end }}
      volumes:
      - name: bootstrap-manifest
        configMap:
          name: {{ .Release.Name }}
{{- if .Values.managedResources.secretsYAML }}
      - name: bootstrap-secrets
        secret:
          secretName: {{ .Release.Name }}
{{- end }}
